worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Upstream — FastAPI ───────────────────────────────────────────────────
    upstream viralytics_api {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # ── Health probe (no auth) ───────────────────────────────────────────
        location /health {
            proxy_pass         http://viralytics_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /ready {
            proxy_pass         http://viralytics_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── API ──────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://viralytics_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Rate limiting — 60 requests/minute per IP
            # Uncomment when nginx limit_req_zone is configured at http block level:
            # limit_req zone=api_limit burst=20 nodelay;
        }

        # ── Docs (dev only — disable in prod nginx.conf) ─────────────────────
        location /docs {
            proxy_pass http://viralytics_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://viralytics_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Metrics endpoint (restrict to internal network in prod) ──────────
        location /metrics {
            # allow 10.0.0.0/8;   # VPC CIDR
            # deny  all;
            proxy_pass http://viralytics_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location / {
            return 404;
        }
    }
}
