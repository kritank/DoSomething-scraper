# ── docker-compose.prod.yml — Production (EC2) ────────────────────────────────
# Uses Amazon SQS instead of Redis for the queue, and Amazon RDS instead of a
# local Postgres container. No nginx/TLS — this box has no public domain, just
# a security-group-restricted API port (see infra/ec2.tf: admin_cidr_block).
#
# This file mirrors the version Terraform writes to /opt/app/docker-compose.prod.yml
# on the EC2 instance (infra/user_data.sh) — keep them in sync if you edit either.
# The version below builds from source (handy for testing the prod config
# locally); the deployed version on EC2 pulls prebuilt GHCR images instead.
#
# Deploy with: docker compose -f docker-compose.prod.yml up -d

services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
    command: ["uv", "run", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
