# ── docker-compose.prod.yml — Production (EC2) ────────────────────────────────
# Uses Amazon SQS instead of Redis for the queue.
# No local DB — DATABASE_URL points to Amazon RDS.
# Deploy with: docker compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: always
    deploy:
      replicas: 2       # scale workers independently

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    env_file: .env
    environment:
      - QUEUE_BACKEND=sqs
      - DEBUG=false
      - LOG_LEVEL=INFO
    restart: always
    deploy:
      replicas: 1       # MUST stay at 1 — single source of schedule truth

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro     # TLS certs from Certbot
    depends_on:
      - api
    restart: always
