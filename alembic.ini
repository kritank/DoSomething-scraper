# Alembic configuration file.
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration filenames
# %(rev)s  — revision id
# %(slug)s — short description slug
file_template = %%(rev)s_%%(slug)s

# sys.path is prepended with this value when running alembic commands
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# Leave blank to use the local timezone
timezone = UTC

# Max characters in slug
truncate_slug_length = 40

# The output encoding used when revision files are written to disk
output_encoding = utf-8

# sqlalchemy.url is set programmatically from app.core.config.settings
# in alembic/env.py — do not set it here
sqlalchemy.url =


[post_write_hooks]
# Post-write hooks allow formatting migration files after generation
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
